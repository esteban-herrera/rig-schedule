<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redmond Investment Group — Meeting Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F4EFE6;
      --black: #111111;
      --yellow: #E8B400;
      --red: #C8281E;
      --border: 2px solid #111111;
      --shadow: 4px 4px 0 #111111;
      --shadow-lg: 6px 6px 0 #111111;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      padding: 56px 48px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-bottom: 72px;
      padding-bottom: 28px;
      border-bottom: var(--border);
      animation: fadeUp 0.5s ease both;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 9vw, 104px);
      line-height: 0.88;
      letter-spacing: 0.02em;
    }

    .header-block {
      width: 88px;
      height: 88px;
      background: var(--black);
      border: var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-block .mono {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      color: var(--cream);
      line-height: 1;
    }

    .header-block .sub {
      font-size: 8px;
      color: rgba(244,239,230,0.5);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: var(--border);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .section-num {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      background: var(--black);
      color: var(--cream);
      padding: 3px 10px;
      letter-spacing: 0.08em;
    }

    /* ── TABLE ── */
    .table-section {
      margin-bottom: 80px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .table-wrapper {
      border: var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--black);
      color: var(--cream);
    }

    th {
      padding: 14px 22px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: left;
    }

    td {
      padding: 16px 22px;
      font-size: 13px;
      border-bottom: 1.5px solid #EBEBEB;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover td { background: #FAFAFA; }

    .meeting-num {
      font-weight: 700;
      color: #BBBBBB;
      font-size: 11px;
    }

    .date-cell { font-weight: 700; }

    .day-cell {
      color: #777;
      font-size: 12px;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1.5px solid var(--black);
    }

    .type-badge.educational { background: var(--yellow); }
    .type-badge.pitch { background: var(--red); color: white; }

    .member-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .member-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--black);
      flex-shrink: 0;
    }

    /* ── CALENDAR ── */
    .calendar-section {
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .year-section { margin-bottom: 48px; }

    .year-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.14em;
      color: #AAAAAA;
      margin-bottom: 18px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 16px;
    }

    .month-card {
      border: var(--border);
      box-shadow: var(--shadow);
      background: white;
      overflow: hidden;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .month-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #111;
    }

    .month-card.break-month {
      background: #E9E4DB;
      opacity: 0.45;
      pointer-events: none;
    }

    .month-header {
      background: var(--black);
      color: var(--cream);
      padding: 9px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .month-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 0.06em;
    }

    .month-year-sub {
      font-size: 9px;
      font-family: 'Space Mono', monospace;
      opacity: 0.45;
    }

    .day-labels-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 7px 8px 3px;
      border-bottom: 1px solid #F0F0F0;
    }

    .day-lbl {
      text-align: center;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #BBBBBB;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 4px 8px 10px;
      gap: 2px;
    }

    .d {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #444;
    }

    .d.meeting-day {
      font-weight: 700;
      border: 2px solid var(--black);
    }

    .d.educational { background: var(--yellow); color: var(--black); }
    .d.pitch       { background: var(--red);    color: white; }

    .month-footer {
      padding: 8px 12px;
      border-top: 1.5px solid #EBEBEB;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .type-pill {
      display: inline-block;
      padding: 2px 8px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1.5px solid var(--black);
      flex-shrink: 0;
    }

    .type-pill.educational { background: var(--yellow); }
    .type-pill.pitch       { background: var(--red); color: white; }

    .footer-member {
      font-weight: 700;
      font-size: 11px;
    }

    /* ── PAGE FOOTER ── */
    .page-footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: var(--border);
      font-size: 9px;
      color: #AAAAAA;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <h1>REDMOND<br>INVESTMENT<br>GROUP</h1>
    <div class="header-block">
      <div class="mono">RIG</div>
      <div class="sub">Est. 2026</div>
    </div>
  </header>

  <!-- ── TABLE ── -->
  <div class="table-section">
    <div class="section-header">
      <span class="section-num">01</span>
      Schedule Table
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Day</th>
            <th>Time</th>
            <th>Meeting Type</th>
            <th>Presenter</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── CALENDAR ── -->
  <div class="calendar-section">
    <div class="section-header">
      <span class="section-num">02</span>
      Calendar View
    </div>
    <div id="calendar-container"></div>
  </div>

  <footer class="page-footer">
    <span>Redmond Investment Group · Meeting Schedule</span>
    <span>Jun 2026 – Sep 2027 · 12 Sessions</span>
  </footer>

  <script>
    const meetings = [
      { date: '2026-06-14', type: 'educational', member: 'JD' },
      { date: '2026-09-13', type: 'pitch',       member: 'Andrew' },
      { date: '2026-10-11', type: 'educational', member: 'Esteban' },
      { date: '2026-11-08', type: 'pitch',       member: 'Ryan' },
      { date: '2026-12-13', type: 'educational', member: 'Jess' },
      { date: '2027-01-10', type: 'pitch',       member: 'Adam' },
      { date: '2027-02-14', type: 'educational', member: 'JD' },
      { date: '2027-03-14', type: 'pitch',       member: 'Andrew' },
      { date: '2027-04-11', type: 'educational', member: 'Esteban' },
      { date: '2027-05-09', type: 'pitch',       member: 'Ryan' },
      { date: '2027-06-13', type: 'educational', member: 'Jess' },
      { date: '2027-09-12', type: 'pitch',       member: 'Adam' },
    ];

    const MEMBER_COLORS = {
      JD: '#C8281E', Andrew: '#0057FF', Esteban: '#E8B400',
      Ryan: '#1A9940', Jess: '#D45F00', Adam: '#7B16B0'
    };

    const BREAK_MONTHS   = new Set(['2026-07','2026-08','2027-07','2027-08']);
    const DISPLAY_MONTHS = [
      '2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12',
      '2027-01','2027-02','2027-03','2027-04','2027-05','2027-06','2027-07','2027-08','2027-09'
    ];
    const MONTH_NAMES = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
    const DAY_ABBR  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    const byDate = {};
    meetings.forEach(m => { byDate[m.date] = m; });

    // ── TABLE ──
    const tbody = document.getElementById('schedule-tbody');
    meetings.forEach((m, i) => {
      const d   = new Date(m.date + 'T12:00:00');
      const fmt = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      const tc  = m.type === 'educational' ? 'educational' : 'pitch';
      const tl  = m.type === 'educational' ? 'Educational' : 'Stock Pitch';
      const tr  = document.createElement('tr');
      tr.innerHTML = `
        <td class="meeting-num">${String(i + 1).padStart(2,'0')}</td>
        <td class="date-cell">${fmt}</td>
        <td class="day-cell">${FULL_DAYS[d.getDay()]}</td>
        <td>7:30 – 8:30 PM</td>
        <td><span class="type-badge ${tc}">${tl}</span></td>
        <td>
          <div class="member-cell">
            <span class="member-pip" style="background:${MEMBER_COLORS[m.member]};"></span>
            ${m.member}
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    // ── CALENDAR ──
    const calContainer = document.getElementById('calendar-container');
    const byYear = {};
    DISPLAY_MONTHS.forEach(ym => {
      const y = ym.slice(0,4);
      (byYear[y] = byYear[y] || []).push(ym);
    });

    Object.entries(byYear).forEach(([year, months]) => {
      const section = document.createElement('div');
      section.className = 'year-section';
      const yl = document.createElement('div');
      yl.className = 'year-label';
      yl.textContent = year;
      section.appendChild(yl);

      const grid = document.createElement('div');
      grid.className = 'calendar-grid';

      months.forEach(ym => {
        const [y, m] = ym.split('-').map(Number);
        const isBreak     = BREAK_MONTHS.has(ym);
        const meeting     = meetings.find(mt => mt.date.startsWith(ym + '-'));
        const firstDOW    = new Date(y, m - 1, 1).getDay();
        const daysInMonth = new Date(y, m, 0).getDate();

        const card = document.createElement('div');
        card.className = 'month-card' + (isBreak ? ' break-month' : '');

        let html = `
          <div class="month-header">
            <span class="month-name">${MONTH_NAMES[m - 1]}</span>
            <span class="month-year-sub">${year}</span>
          </div>
          <div class="day-labels-row">
            ${DAY_ABBR.map(d => `<div class="day-lbl">${d}</div>`).join('')}
          </div>
          <div class="days-grid">
            ${Array(firstDOW).fill('<div class="d"></div>').join('')}`;

        for (let day = 1; day <= daysInMonth; day++) {
          const ds  = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const mtg = byDate[ds];
          if (mtg) {
            const cls = mtg.type === 'educational' ? 'educational' : 'pitch';
            html += `<div class="d meeting-day ${cls}" title="${mtg.member}">${day}</div>`;
          } else {
            html += `<div class="d">${day}</div>`;
          }
        }

        html += '</div>';

        if (meeting) {
          const tc = meeting.type === 'educational' ? 'educational' : 'pitch';
          const tl = meeting.type === 'educational' ? 'Educational' : 'Stock Pitch';
          html += `
            <div class="month-footer">
              <span class="type-pill ${tc}">${tl}</span>
              <span class="footer-member" style="color:${MEMBER_COLORS[meeting.member]};">${meeting.member}</span>
            </div>`;
        }

        card.innerHTML = html;
        grid.appendChild(card);
      });

      section.appendChild(grid);
      calContainer.appendChild(section);
    });
  </script>
</body>
</html>
