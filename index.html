<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redmond Investment Group — Meeting Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F4EFE6;
      --black: #111111;
      --yellow: #E8B400;
      --red: #C8281E;
      --border: 2px solid #111111;
      --shadow: 4px 4px 0 #111111;
      --shadow-lg: 6px 6px 0 #111111;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      padding: 56px 48px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: var(--border);
      animation: fadeUp 0.5s ease both;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5.5vw, 64px);
      line-height: 0.88;
      letter-spacing: 0.02em;
    }

    .header-block {
      width: 60px;
      height: 60px;
      background: var(--black);
      border: var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-block .mono {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--cream);
      line-height: 1;
    }

    .header-block .sub {
      font-size: 7px;
      color: rgba(244,239,230,0.5);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: var(--border);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .section-num {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      background: var(--black);
      color: var(--cream);
      padding: 3px 10px;
      letter-spacing: 0.08em;
    }

    /* ── TABLE ── */
    .table-section {
      margin-bottom: 80px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .table-wrapper {
      border: var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--black);
      color: var(--cream);
    }

    th {
      padding: 14px 22px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: left;
    }

    td {
      padding: 16px 22px;
      font-size: 13px;
      border-bottom: 1.5px solid #EBEBEB;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover td { background: #FAFAFA; }

    .meeting-num {
      font-weight: 700;
      color: #BBBBBB;
      font-size: 11px;
    }

    .date-cell { font-weight: 700; }

    .day-cell {
      color: #777;
      font-size: 12px;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1.5px solid var(--black);
    }

    .type-badge.educational { background: var(--yellow); }
    .type-badge.pitch { background: var(--red); color: white; }

    .member-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .member-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--black);
      flex-shrink: 0;
    }

    /* ── PAGE FOOTER ── */
    .page-footer {
      margin-top: 64px;
      padding-top: 16px;
      border-top: var(--border);
      font-size: 9px;
      color: #AAAAAA;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NOTES ── */
    .notes-section {
      margin-top: 80px;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .note-card {
      border: var(--border);
      box-shadow: var(--shadow);
      background: white;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .note-card-header {
      background: var(--black);
      color: var(--cream);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .note-card-header .meeting-num { color: rgba(244,239,230,0.45); }
    .note-card-header .date-cell   { color: var(--cream); }

    .note-back-link {
      margin-left: auto;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(244,239,230,0.55);
      text-decoration: none;
      border: 1px solid rgba(244,239,230,0.25);
      padding: 3px 10px;
      transition: color 0.12s, border-color 0.12s;
    }
    .note-back-link:hover { color: var(--cream); border-color: var(--cream); }

    .note-body { padding: 20px 22px; }

    .note-topic { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .note-topic-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #AAAAAA;
      margin-right: 8px;
    }

    .note-transactions { display: flex; flex-direction: column; gap: 8px; }

    .transaction {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .txn-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1.5px solid var(--black);
      flex-shrink: 0;
    }
    .txn-badge.buy  { background: #1A9940; color: white; }
    .txn-badge.sell { background: var(--red); color: white; }

    .notes-link {
      font-size: 10px;
      font-weight: 700;
      color: var(--black);
      text-decoration: none;
      letter-spacing: 0.08em;
      border: 1.5px solid var(--black);
      padding: 3px 9px;
      display: inline-block;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .notes-link:hover { background: var(--black); color: var(--cream); }

    .no-notes { color: #CCCCCC; font-size: 13px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      body { padding: 24px 16px; }

      .header { margin-bottom: 40px; padding-bottom: 20px; }
      .header-block { width: 64px; height: 64px; }
      .header-block .mono { font-size: 26px; }

      .section-header { font-size: 26px; }

      .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { min-width: 620px; }
      th, td { padding: 12px 14px; }

      .table-section { margin-bottom: 56px; }

      .page-footer { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <h1>REDMOND<br>INVESTMENT<br>GROUP</h1>
    <div class="header-block">
      <div class="mono">RIG</div>
      <div class="sub">Est. 2026</div>
    </div>
  </header>

  <!-- ── TABLE ── -->
  <div class="table-section">
    <div class="section-header">
      <span class="section-num">01</span>
      Schedule Table
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Day</th>
            <th>Time</th>
            <th>Meeting Type</th>
            <th>Presenter</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── NOTES ── -->
  <div id="notes-section" class="notes-section" style="display:none;">
    <div class="section-header">
      <span class="section-num">02</span>
      Meeting Notes
    </div>
    <div id="notes-container"></div>
  </div>

  <footer class="page-footer">
    <span>Redmond Investment Group · Meeting Schedule</span>
    <span>May 2026 – Jun 2027 · 12 Sessions</span>
  </footer>

  <script>
    // type computed below; add topic + transactions after each meeting
    const meetings = [
      { date: '2026-05-10', member: 'JD',      topic: 'Micron Technology (MU)', transactions: [] },
      { date: '2026-06-14', member: 'Andrew',   topic: '', transactions: [] },
      { date: '2026-09-13', member: 'Esteban',  topic: '', transactions: [] },
      { date: '2026-10-11', member: 'Ryan',     topic: '', transactions: [] },
      { date: '2026-11-08', member: 'Jess',     topic: '', transactions: [] },
      { date: '2026-12-13', member: 'Adam',     topic: '', transactions: [] },
      { date: '2027-01-10', member: 'JD',       topic: '', transactions: [] },
      { date: '2027-02-14', member: 'Andrew',   topic: '', transactions: [] },
      { date: '2027-03-14', member: 'Esteban',  topic: '', transactions: [] },
      { date: '2027-04-11', member: 'Ryan',     topic: '', transactions: [] },
      { date: '2027-05-09', member: 'Jess',     topic: '', transactions: [] },
      { date: '2027-06-13', member: 'Adam',     topic: '', transactions: [] },
    ];

    // Each member's first appearance type; subsequent appearances flip
    const MEMBER_BASE_TYPE = {
      JD: 'pitch', Andrew: 'educational', Esteban: 'pitch',
      Ryan: 'educational', Jess: 'pitch', Adam: 'educational'
    };
    const memberOccurrence = {};
    meetings.forEach(m => {
      const n = (memberOccurrence[m.member] = (memberOccurrence[m.member] || 0) + 1);
      const base = MEMBER_BASE_TYPE[m.member];
      m.type = (n % 2 === 1) ? base : (base === 'educational' ? 'pitch' : 'educational');
    });

    const MEMBER_COLORS = {
      JD: '#C8281E', Andrew: '#0057FF', Esteban: '#E8B400',
      Ryan: '#1A9940', Jess: '#D45F00', Adam: '#7B16B0'
    };

    const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    // ── TABLE ──
    const tbody = document.getElementById('schedule-tbody');
    meetings.forEach((m, i) => {
      const d   = new Date(m.date + 'T12:00:00');
      const fmt = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      const tc  = m.type === 'educational' ? 'educational' : 'pitch';
      const tl  = m.type === 'educational' ? 'Educational' : 'Stock Pitch';
      const tr  = document.createElement('tr');
      tr.id = 'row-' + (i + 1);
      const hasNotes = m.topic || m.transactions.length;
      tr.innerHTML = `
        <td class="meeting-num">${String(i + 1).padStart(2,'0')}</td>
        <td class="date-cell">${fmt}</td>
        <td class="day-cell">${FULL_DAYS[d.getDay()]}</td>
        <td>7:30 – 8:30 PM</td>
        <td><span class="type-badge ${tc}">${tl}</span></td>
        <td>
          <div class="member-cell">
            <span class="member-pip" style="background:${MEMBER_COLORS[m.member]};"></span>
            ${m.member}
          </div>
        </td>
        <td>${hasNotes ? `<a class="notes-link" href="#note-${i+1}">↓ Notes</a>` : '<span class="no-notes">—</span>'}</td>`;
      tbody.appendChild(tr);
    });

    // ── NOTES ──
    // Out-of-rotation entries (pre-schedule meetings, group decisions, etc.)
    const extraNotes = [
      {
        date: '2026-04-12',
        label: 'Group Meeting',
        topic: '',
        transactions: [
          'SELL Coherus Sciences — 75 shares',
          'SELL Tencent — 15 shares',
          'BUY Nextera Energy — 5 shares',
        ]
      },
    ];

    const notesWithContent = meetings.filter(m => m.topic || m.transactions.length);
    if (notesWithContent.length || extraNotes.length) {
      document.getElementById('notes-section').style.display = '';
      const notesContainer = document.getElementById('notes-container');

      function makeTxnHTML(transactions) {
        return transactions.map(t => {
          const action = t.trim().split(' ')[0].toLowerCase();
          const cls = action === 'buy' ? 'buy' : action === 'sell' ? 'sell' : '';
          return `<div class="transaction"><span class="txn-badge ${cls}">${action.toUpperCase()}</span><span>${t.trim().replace(/^(buy|sell)\s+/i,'')}</span></div>`;
        }).join('');
      }

      // Combine scheduled meeting notes + extra notes, sort by date
      const allNotes = [];
      meetings.forEach((m, i) => {
        if (m.topic || m.transactions.length)
          allNotes.push({ date: m.date, type: 'meeting', m, i });
      });
      extraNotes.forEach(e => {
        if (e.topic || e.transactions.length)
          allNotes.push({ date: e.date, type: 'extra', e });
      });
      allNotes.sort((a, b) => a.date.localeCompare(b.date));

      allNotes.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'note-card';

        if (entry.type === 'meeting') {
          const { m, i } = entry;
          const d   = new Date(m.date + 'T12:00:00');
          const fmt = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
          const tc  = m.type === 'educational' ? 'educational' : 'pitch';
          const tl  = m.type === 'educational' ? 'Educational' : 'Stock Pitch';
          const txnHTML = makeTxnHTML(m.transactions);
          card.id = 'note-' + (i + 1);
          card.innerHTML = `
            <div class="note-card-header">
              <span class="meeting-num">${String(i+1).padStart(2,'0')}</span>
              <span class="date-cell">${fmt}</span>
              <span class="type-badge ${tc}">${tl}</span>
              <div class="member-cell">
                <span class="member-pip" style="background:${MEMBER_COLORS[m.member]};border-color:rgba(244,239,230,0.4);"></span>
                <span style="color:var(--cream);font-weight:700;">${m.member}</span>
              </div>
              <a class="note-back-link" href="#row-${i+1}">↑ Table</a>
            </div>
            <div class="note-body">
              ${m.topic ? `<div class="note-topic"><span class="note-topic-label">Topic</span>${m.topic}</div>` : ''}
              ${txnHTML ? `<div class="note-transactions">${txnHTML}</div>` : ''}
            </div>`;
        } else {
          const { e } = entry;
          const d   = new Date(e.date + 'T12:00:00');
          const fmt = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
          const txnHTML = makeTxnHTML(e.transactions);
          card.innerHTML = `
            <div class="note-card-header">
              <span class="date-cell">${fmt}</span>
              <span style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(244,239,230,0.55);">${e.label}</span>
            </div>
            <div class="note-body">
              ${e.topic ? `<div class="note-topic"><span class="note-topic-label">Topic</span>${e.topic}</div>` : ''}
              ${txnHTML ? `<div class="note-transactions">${txnHTML}</div>` : ''}
            </div>`;
        }
        notesContainer.appendChild(card);
      });
    }
  </script>
</body>
</html>
